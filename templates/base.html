<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  <meta name="author" content="{{author}}">

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" id="theme">
  <!-- Highlight.js for code -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
/* Responsive Overflow Fix */
.reveal .slides section {
  max-height: 100%;
  overflow-y: auto !important;
  overflow-x: hidden;
  box-sizing: border-box;
}

/* Scroll Indicator */
.scroll-indicator {
  position: absolute;
  bottom: 80px;
  right: 40px;
  color: var(--accent-primary, rgba(200,200,216,0.8));
  width: 40px;
  height: 40px;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  display: flex;
  justify-content: center;
  align-items: center;
}
.scroll-indicator svg {
  width: 32px;
  height: 32px;
  stroke-width: 3;
}
@keyframes flash-scroll {
  0% { opacity: 0; transform: translateY(-10px); }
  15% { opacity: 1; transform: translateY(0); }
  85% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(8px); }
}
.scroll-indicator.active {
  animation: flash-scroll 2.5s ease-in-out 6 forwards;
}
{{theme_css}}

/* Editor Style for Code Blocks */
.reveal pre {
  box-shadow: 0 16px 40px rgba(0,0,0,0.5) !important;
  border-radius: 12px !important;
  background: var(--surface-1, #1e1e1e) !important;
  border: 1px solid var(--border-subtle) !important;
  position: relative !important;
  margin-top: 24px !important;
  padding-top: 40px !important;
}
.reveal pre::before {
  content: '';
  position: absolute;
  top: 15px;
  left: 18px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #ff5f56;
  box-shadow: 20px 0 0 #ffbd2e, 40px 0 0 #27c93f;
  z-index: 10;
}
.reveal pre code {
  padding: 8px 24px 24px !important;
  background: transparent !important;
  border: none !important;
  border-radius: 0 0 12px 12px !important;
  display: block !important;
  overflow-x: auto !important;
  text-align: left !important;
  white-space: pre !important;
}
  </style>
</head>
<body>
  {{expiration_script}}
  <div class="reveal">
    <div class="slides">
{{slides_html}}
    </div>
  </div>

  <!-- Reveal.js Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      width: 1200,
      height: 700,
      margin: 0.04,
      center: false,
      transition: 'slide',
      transitionSpeed: 'default',
      backgroundTransition: 'fade',
      plugins: [RevealHighlight],
      keyboard: {
        70: () => {
          const elem = document.documentElement;
          if (!document.fullscreenElement) {
            elem.requestFullscreen?.() || elem.webkitRequestFullscreen?.();
          } else {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.();
          }
        }
      }
    });

    // Setup Scroll Indicator
    const scrollIndicator = document.createElement('div');
    scrollIndicator.className = 'scroll-indicator';
    scrollIndicator.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>';
    document.querySelector('.reveal').appendChild(scrollIndicator);

    function checkScroll() {
      const currentSlide = Reveal.getCurrentSlide();
      if (!currentSlide) return;
      
      // Wait a tiny bit for render
      setTimeout(() => {
        if (currentSlide.scrollHeight > currentSlide.clientHeight + 10) {
          scrollIndicator.classList.remove('active');
          void scrollIndicator.offsetWidth; // trigger reflow
          scrollIndicator.classList.add('active');
        } else {
          scrollIndicator.classList.remove('active');
        }
      }, 50);
    }

    Reveal.on('ready', checkScroll);
    Reveal.on('slidechanged', checkScroll);
  </script>
</body>
</html>
